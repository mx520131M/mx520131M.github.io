<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <title>导航主页</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#f5f6fa;padding:15px;}
        .search-box{text-align:center;margin:20px 0;}
        .search-box input{padding:10px;width:70%;max-width:400px;border-radius:6px;border:1px solid #ccc;outline:none;}
        .search-box button{padding:10px 20px;background:#0088ff;color:#fff;border:none;border-radius:6px;margin-left:5px;cursor:pointer;}
        .title-tag{text-align:center;font-size:16px;font-weight:bold;color:#fff;background:#e63946;padding:8px;border-radius:8px;margin:15px 10px;}
        .zone-tag{text-align:center;font-size:15px;font-weight:bold;color:#fff;background:#222;padding:7px;border-radius:8px;margin:20px 10px 10px;}
        .nav-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;margin-top:20px;}
        .card{background:#fff;border-radius:10px;padding:12px;text-align:center;box-shadow:0 2px 8px #00000015;}
        .card img{width:60px;height:60px;object-fit:contain;margin-bottom:8px;border-radius:6px;}
        .card a{text-decoration:none;color:#333;font-size:14px;font-weight:500;display:block;line-height:1.3;}
        .card:hover{background:#0088ff;}
        .card:hover a{color:#fff;}
    </style>
</head>
<body>
